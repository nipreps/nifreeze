name: Prediction gallery

on:
  schedule:
    - cron: '0 3 * * 1'  # Every Monday at 03:00 UTC
  # Allow manual triggering (and, on dispatch, opening a refresh PR)
  workflow_dispatch:

defaults:
  run:
    shell: bash

env:
  FORCE_COLOR: true
  NIFREEZE_WERRORS: 1
  NIFREEZE_GALLERY_DATA: /home/runner/nifreeze-gallery-data
  NIFREEZE_GALLERY_OUT: /home/runner/gallery-out

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gallery:
    runs-on: 'ubuntu-latest'
    # Prediction only — no registration — so ANTs/AFNI/TeX are not needed.
    permissions:
      contents: write
      pull-requests: write

    strategy:
      matrix:
        python-version: ['3.12']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install git-annex (DataLad backend)
        run: |
          sudo apt-get update
          sudo apt-get install -y git-annex

      - name: Configure Git user for DataLad
        run: |
          git config --global user.email "nipreps@gmail.com"
          git config --global user.name "nipreps-bot"

      - name: Cache fetched OpenNeuro data
        uses: actions/cache@v4
        with:
          path: ${{ env.NIFREEZE_GALLERY_DATA }}
          key: gallery-data-v1

      - name: Install tox
        run: |
          python -m pip install --upgrade pip
          pip install tox

      - name: Generate the gallery (manifest + executed notebooks)
        run: tox -e gallery

      - name: Upload manifest, panels, and coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gallery-output
          path: |
            ${{ env.NIFREEZE_GALLERY_OUT }}
            coverage-gallery.xml
          if-no-files-found: warn

      - name: Upload executed notebooks
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gallery-notebooks
          path: docs/notebooks/gallery/*.ipynb

      # On manual dispatch, open a PR refreshing the committed notebook outputs.
      # Scheduled runs only publish artifacts (avoids noisy auto-commits, e.g.
      # from GP run-to-run variation) — a maintainer refreshes deliberately.
      - name: Open refresh PR
        if: github.event_name == 'workflow_dispatch' && github.repository == 'nipreps/nifreeze'
        uses: peter-evans/create-pull-request@v7
        with:
          branch: gallery/refresh-notebooks
          title: "DOC: Refresh prediction gallery notebook outputs"
          commit-message: "doc(gallery): refresh executed notebook outputs"
          body: |
            Automated refresh of the prediction gallery notebook outputs
            (`docs/notebooks/gallery/*.ipynb`), generated by the `gallery` workflow.
          add-paths: docs/notebooks/gallery/*.ipynb
          delete-branch: true
